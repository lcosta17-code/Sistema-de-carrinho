                    <li class="produto-item">
                        <span class="produto-nome">Notebook Core i7 16GB RAM</span>

                    </li>

                    <li class="produto-item">
                        <span class="produto-nome">Monitor Gamer 144Hz 27"</span>
                        <span class="produto-preco">R$ 1.199,00</span>
                        <button class="btn-adicionar">Adicionar</button>
                    </li>
                    <li class="produto-item">
                        <span class="produto-nome">Teclado Mecânico RGB</span>
                        <span class="produto-preco">R$ 299,00</span>
                        <button class="btn-adicionar">Adicionar</button>
